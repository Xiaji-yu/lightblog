# 服务器配置
# 为了安全，建议将敏感信息存储在环境变量中

servers:
  router:
    name: "软路由"
    host: "192.168.1.2"
    port: 22
    username: "root"
    # 密码建议通过环境变量 ROUTER_PASSWORD 设置
    password_env: "ROUTER_PASSWORD"

  nas:
    name: "NAS"
    host: "192.168.1.110"
    port: 22
    username: "yll"
    password_env: "NAS_PASSWORD"

  cloud:
    name: "云服务器"
    host: "xiaji.xin"
    port: 22
    username: "root"
    password_env: "CLOUD_PASSWORD"

  openclaw:
    name: "OpenClaw"
    host: "192.168.1.111"
    port: 22
    username: "xiaji"
    password_env: "OPENCLAW_PASSWORD"

# 检测超时时间（毫秒）
timeout: 10000

# Web服务器端口
port: 3000
