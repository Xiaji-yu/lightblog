<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章详情 - 我的博客</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --sidebar-width: 280px;
            --content-max-width: 900px;
        }

        /* 文章容器：Grid布局 */
        .article-container {
            display: grid;
            grid-template-columns: var(--sidebar-width) 1fr;
            gap: 30px;
            max-width: calc(var(--sidebar-width) + var(--content-max-width) + 30px);
            margin: 100px auto 60px;
            padding: 0 20px;
        }

        /* 左侧边栏 */
        .sidebar {
            position: sticky;
            top: 100px;
            height: fit-content;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
        }

        .sidebar-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--primary-color);
        }

        .article-nav-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .article-nav-list li {
            margin-bottom: 4px;
        }

        .article-nav-item {
            display: block;
            padding: 10px 14px;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
            line-height: 1.4;
        }

        .article-nav-item:hover {
            background: var(--bg-secondary);
            color: var(--primary-color);
        }

        .article-nav-item.active {
            background: rgba(16, 185, 129, 0.1);
            color: var(--primary-color);
            border-left-color: var(--primary-color);
            font-weight: 600;
        }

        /* 文章内容区域 */
        .article-content-wrapper {
            background: var(--bg-primary);
            border-radius: 16px;
            padding: 40px;
            box-shadow: var(--shadow-md);
            line-height: 1.8;
            font-size: 16px;
            max-width: 900px;  /* 限制内容最大宽度 */
            margin: 0 auto;    /* 水平居中 */
            width: 100%;
        }

        /* 文章头部样式 */
        .article-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .article-cover {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .article-title {
            font-family: var(--font-heading);
            font-size: 42px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 20px;
            line-height: 1.3;
        }

        .article-meta {
            display: flex;
            justify-content: center;
            gap: 20px;
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .article-meta .category {
            display: inline-block;
            padding: 4px 16px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--primary-color);
            border-radius: 20px;
            font-weight: 600;
        }

        /* 文章内容样式 */
        .article-content {
            padding: 0;
        }

        .article-content h1,
        .article-content h2,
        .article-content h3,
        .article-content h4,
        .article-content h5,
        .article-content h6 {
            font-family: var(--font-heading);
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            color: var(--text-primary);
            scroll-margin-top: 20px;
        }

        .article-content h1 { font-size: 2em; }
        .article-content h2 { font-size: 1.75em; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; }
        .article-content h3 { font-size: 1.5em; }
        .article-content p { margin-bottom: 1.2em; }
        .article-content ul, .article-content ol { margin-bottom: 1.2em; padding-left: 2em; }
        .article-content li { margin-bottom: 0.5em; }
        .article-content blockquote {
            border-left: 4px solid var(--primary-color);
            padding-left: 20px;
            margin: 1.5em 0;
            color: var(--text-secondary);
            font-style: italic;
        }
        .article-content code {
            background: var(--bg-secondary);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }
        .article-content pre {
            background: var(--bg-dark);
            color: #fff;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1.5em 0;
        }
        .article-content pre code {
            background: none;
            padding: 0;
            color: inherit;
        }
        .article-content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 1.5em 0;
        }
        .article-content hr {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 2em 0;
        }
        .article-content a {
            color: var(--primary-color);
            text-decoration: none;
        }
        .article-content a:hover {
            text-decoration: underline;
        }

        .loading {
            text-align: center;
            padding: 100px 20px;
            color: var(--text-secondary);
        }

        .error {
            text-align: center;
            padding: 100px 20px;
            color: var(--danger-color);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            margin-bottom: 20px;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: var(--primary-color);
        }

        /* 响应式设计 */
        @media (max-width: 1024px) {
            .article-container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .article-title {
                font-size: 32px;
            }

            .article-content-wrapper {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <a href="index.html" style="display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit;">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>我的博客</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- 文章详情容器 -->
    <div class="article-container">
        <!-- 左侧边栏：文章列表导航 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-title">📚 文章列表</div>
            <ul class="article-nav-list" id="tocList">
                <li><a href="#" class="article-nav-item">加载中...</a></li>
            </ul>
        </aside>

        <!-- 右侧文章内容 -->
        <div class="article-content-wrapper" id="articleDetail">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <!-- 引入marked.js用于Markdown解析 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/article.js"></script>
</body>
</html>
