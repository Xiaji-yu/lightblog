<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客时间线 - 我的博客</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --timeline-color: var(--primary-color);
            --timeline-line-width: 3px;
            --timeline-dot-size: 16px;
        }

        .timeline-container {
            max-width: 1000px;
            margin: 100px auto 60px;
            padding: 0 20px;
        }

        .timeline-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .timeline-header h1 {
            font-size: 42px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        .timeline-header p {
            font-size: 16px;
            color: var(--text-secondary);
        }

        .timeline {
            position: relative;
            padding: 20px 0;
        }

        /* 时间线竖线 */
        .timeline::before {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 0;
            bottom: 0;
            width: var(--timeline-line-width);
            background: linear-gradient(to bottom, var(--primary-color), var(--primary-light));
            border-radius: 2px;
        }

        .timeline-items {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 40px;
            width: 50%;
            padding-right: 40px;
        }

        .timeline-item:nth-child(even) {
            margin-left: 50%;
            padding-right: 0;
            padding-left: 40px;
        }

        /* 时间线圆点 */
        .timeline-item::before {
            content: '';
            position: absolute;
            top: 20px;
            right: -8px;
            width: var(--timeline-dot-size);
            height: var(--timeline-dot-size);
            background: var(--primary-color);
            border: 4px solid var(--bg-secondary);
            border-radius: 50%;
            z-index: 1;
            box-shadow: 0 2px 8px rgba(16, 185, 129, 0.3);
        }

        .timeline-item:nth-child(even)::before {
            right: auto;
            left: -8px;
        }

        /* 时间标签 */
        .timeline-date {
            position: absolute;
            top: 18px;
            right: -140px;
            width: 120px;
            text-align: right;
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .timeline-item:nth-child(even) .timeline-date {
            right: auto;
            left: -140px;
            text-align: left;
        }

        /* 文章卡片 */
        .timeline-card {
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 24px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            height: auto;
            min-height: 180px;
        }

        .timeline-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary-color);
        }

        .timeline-card .category {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--primary-color);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .timeline-card h3 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .timeline-card .excerpt {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .timeline-card .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: var(--text-light);
            margin-top: auto; /* 推到底部 */
            padding-top: 16px;
        }

        .timeline-card .read-more {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: gap 0.2s ease;
        }

        .timeline-card .read-more:hover {
            gap: 8px;
        }

        .timeline-card .read-more svg {
            width: 16px;
            height: 16px;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .timeline-header h1 {
                font-size: 32px;
            }

            .timeline::before {
                left: 20px;
                transform: none;
            }

            .timeline-item {
                width: 100%;
                padding-left: 50px !important;
                padding-right: 0 !important;
                margin-left: 0 !important;
            }

            .timeline-item::before {
                left: 12px !important;
                right: auto !important;
            }

            .timeline-date {
                position: static;
                width: 100%;
                text-align: left;
                margin-bottom: 8px;
                padding-left: 0;
            }

            .timeline-item:nth-child(even) .timeline-date {
                text-align: left;
                padding-left: 0;
            }
        }

        /* 加载和错误状态 */
        .timeline-loading {
            text-align: center;
            padding: 100px 20px;
            color: var(--text-secondary);
            font-size: 18px;
        }

        .timeline-error {
            text-align: center;
            padding: 100px 20px;
            color: var(--danger-color);
        }

        .back-nav {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            margin-bottom: 30px;
            transition: color 0.3s ease;
        }

        .back-nav:hover {
            color: var(--primary-color);
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <a href="index.html" style="display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit;">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>我的博客</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- 时间线容器 -->
    <div class="timeline-container">
        <a href="index.html" class="back-nav">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            返回首页
        </a>

        <div class="timeline-header">
            <h1>📜 博客时间线</h1>
            <p>记录技术成长的每一步</p>
        </div>

        <div class="timeline" id="timeline">
            <div class="timeline-loading">加载中...</div>
        </div>
    </div>

    <script>
        // DOM 元素
        const timeline = document.getElementById('timeline');

        // 加载所有文章
        async function loadTimeline() {
            try {
                const response = await fetch('/api/articles');
                if (!response.ok) throw new Error('获取文章失败');

                const articles = await response.json();
                renderTimeline(articles);
            } catch (error) {
                console.error('加载时间线失败:', error);
                timeline.innerHTML = '<div class="timeline-error">加载失败：' + error.message + '</div>';
            }
        }

        // 渲染时间线
        function renderTimeline(articles) {
            console.log('渲染时间线，文章数据:', articles); // 调试

            if (articles.length === 0) {
                timeline.innerHTML = '<div class="timeline-empty">暂无文章</div>';
                return;
            }

            // 按日期排序（降序，最新的在前）
            articles.sort((a, b) => new Date(b.date) - new Date(a.date));

            const html = `
                <ul class="timeline-items">
                    ${articles.map(article => {
                        console.log('文章:', article.title, 'category:', article.category); // 调试
                        return `
                        <li class="timeline-item">
                            <div class="timeline-date">${formatDate(article.date)}</div>
                            <a href="article.html?id=${encodeURIComponent(article.id)}" class="timeline-card">
                                <span class="category">${escapeHtml(article.category || '未分类')}</span>
                                <h3>${escapeHtml(article.title || article.filename.replace('.md', ''))}</h3>
                                <p class="excerpt">${escapeHtml(article.excerpt || '暂无摘要')}</p>
                                <div class="meta">
                                    <span>${article.filename}</span>
                                    <span class="read-more">
                                        阅读全文
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                                            <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                        </svg>
                                    </span>
                                </div>
                            </a>
                        </li>
                    `}).join('')}
                </ul>
            `;

            timeline.innerHTML = html;
        }

        // 工具函数：转义HTML
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 工具函数：格式化日期
        function formatDate(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            return date.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        // 页面加载时执行
        loadTimeline();
    </script>
</body>
</html>
